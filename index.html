<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
</head>
<body>
    <div>
        <h1>Chatbot Interface</h1>
        <input type="text" id="freeTextInput" placeholder="Ask me anything..." />
        <button id="submitButton">Submit</button>
        <button id="resetButton">Reset</button>
        <script>
            // Original button functionality
            document.getElementById('submitButton').addEventListener('click', function() {
                var userInput = document.getElementById('freeTextInput').value;
                // Handle submit action
                console.log('User input:', userInput);
                // Additional functionality can go here
            });

            document.getElementById('resetButton').addEventListener('click', function() {
                document.getElementById('freeTextInput').value = '';
            });
        </script>
    </div>
</body>
</html>
